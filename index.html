<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正負數加減法練習場</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        h1 { color: #2c3e50; }
        .hidden { display: none !important; }
        
        input[type="text"], input[type="number"] {
            font-size: 18px;
            padding: 10px;
            width: 80%;
            margin-bottom: 15px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            text-align: center;
        }
        button {
            font-size: 18px;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            margin: 5px;
        }
        button:hover { background-color: #2980b9; }
        .btn-advance { background-color: #e67e22; }
        .btn-advance:hover { background-color: #d35400; }

        .scoreboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
            font-size: 16px;
        }

        .quiz-section { margin: 30px 0; }
        .question { font-size: 36px; font-weight: bold; color: #2c3e50; margin-bottom: 20px; }
        
        .feedback { font-size: 20px; font-weight: bold; margin-top: 15px; min-height: 30px; }
        .correct { color: #27ae60; }
        .wrong { color: #c0392b; }
        .hint { font-size: 14px; color: #7f8c8d; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-stage">
        <h1>正負數加減法練習</h1>
        <input type="text" id="username" placeholder="請輸入你的名字" autofocus>
        <br>
        <button onclick="startGame('basic')">基礎模式 (2個數)</button>
        <button onclick="startGame('advanced')" class="btn-advance">進階模式 (3個數)</button>
    </div>

    <div id="quiz-stage" class="hidden">
        <div class="scoreboard">
            <div>學生姓名: <span id="lbl-name">-</span></div>
            <div>練習題數: <span id="lbl-total">0</span> 題</div>
            <div>答對題數: <span id="lbl-correct">0</span> 題</div>
            <div>答錯題數: <span id="lbl-wrong">0</span> 題</div>
            <div style="grid-column: span 2; text-align: center; font-weight: bold;">
                正確率: <span id="lbl-rate">0</span>%
            </div>
        </div>

        <div class="quiz-section">
            <div class="question" id="question-text">(-5) + 12 = ?</div>
            <input type="number" id="user-answer" placeholder="請輸入答案" autocomplete="off">
            <br>
            <button id="btn-submit" onclick="checkAnswer()">送出答案 (Enter)</button>
            <div class="feedback" id="feedback-text"></div>
            <div class="hint hidden" id="space-hint">請按 【空白鍵 Space】 進入下一題</div>
        </div>
        <button onclick="exitGame()" style="background-color: #95a5a6;">返回主選單</button>
    </div>
</div>

<script>
    // 這裡已經貼上你專屬的 Firebase 金鑰配置囉！
    const firebaseConfig = {
        apiKey: "AIzaSyBVsWn1_ejMdHsqsYLkaDQHYXyraDeQD_U",
        authDomain: "math-quiz-f0e5b.firebaseapp.com",
        databaseURL: "https://math-quiz-f0e5b-default-rtdb.firebaseio.com",
        projectId: "math-quiz-f0e5b",
        storageBucket: "math-quiz-f0e5b.firebasestorage.app",
        messagingSenderId: "657003713715",
        appId: "1:657003713715:web:122ea4c0653d15753d4cc6"
    };
    
    // 初始化 Firebase 並做防錯處理
    let database = null;
    if (typeof firebase !== 'undefined') {
        firebase.initializeApp(firebaseConfig);
        database = firebase.database();
    } else {
        console.error("Firebase SDK 載入失敗！請檢查電腦是否已連接網路。");
    }

    // 遊戲狀態變數
    let currentData = {
        name: '',
        mode: 'basic',
        total: 0,
        correct: 0,
        wrong: 0
    };
    let currentAnswer = 0;
    let isWaitingForNext = false;

    function startGame(mode) {
        const nameInput = document.getElementById('username').value.trim();
        if (!nameInput) {
            alert('請先輸入名字喔！');
            return;
        }
        
        currentData.name = nameInput;
        currentData.mode = mode;
        currentData.total = 0;
        currentData.correct = 0;
        currentData.wrong = 0;

        document.getElementById('lbl-name').innerText = currentData.name;
        updateScoreboard();
        
        document.getElementById('login-stage').classList.add('hidden');
        document.getElementById('quiz-stage').classList.remove('hidden');
        
        generateQuestion();
    }

    function getRandomNum() {
        return Math.floor(Math.random() * 21) - 10;
    }

    function getRandomOp() {
        return Math.random() < 0.5 ? '+' : '-';
    }

    function formatNum(num) {
        if (num < 0) return `(${num})`;
        return num;
    }

    function generateQuestion() {
        isWaitingForNext = false;
        document.getElementById('feedback-text').className = 'feedback';
        document.getElementById('feedback-text').innerText = '';
        document.getElementById('space-hint').classList.add('hidden');
        
        const ansInput = document.getElementById('user-answer');
        ansInput.value = '';
        ansInput.disabled = false;
        ansInput.focus();
        document.getElementById('btn-submit').disabled = false;

        let qText = '';
        if (currentData.mode === 'basic') {
            let n1 = getRandomNum();
            let n2 = getRandomNum();
            let op = getRandomOp();
            
            qText = `${formatNum(n1)} ${op} ${formatNum(n2)} = ?`;
            currentAnswer = op === '+' ? n1 + n2 : n1 - n2;
        } else {
            let n1 = getRandomNum();
            let n2 = getRandomNum();
            let n3 = getRandomNum();
            let op1 = getRandomOp();
            let op2 = getRandomOp();
            
            qText = `${formatNum(n1)} ${op1} ${formatNum(n2)} ${op2} ${formatNum(n3)} = ?`;
            
            let temp = op1 === '+' ? n1 + n2 : n1 - n2;
            currentAnswer = op2 === '+' ? temp + n3 : temp - n3;
        }

        document.getElementById('question-text').innerText = qText;
    }

    function checkAnswer() {
        if (isWaitingForNext) return;

        const userInput = document.getElementById('user-answer').value;
        if (userInput === '') {
            alert('請輸入答案！');
            return;
        }

        const userAnswer = parseInt(userInput, 10);
        currentData.total++;

        const feedbackEl = document.getElementById('feedback-text');
        const ansInput = document.getElementById('user-answer');
        ansInput.disabled = true;
        document.getElementById('btn-submit').disabled = true;

        if (userAnswer === currentAnswer) {
            currentData.correct++;
            feedbackEl.innerText = '⭕ 太棒了！答對了！';
            feedbackEl.className = 'feedback correct';
            saveDataToFirebase();
            
            isWaitingForNext = true;
            setTimeout(() => {
                if(isWaitingForNext) generateQuestion();
            }, 2000);
        } else {
            currentData.wrong++;
            feedbackEl.innerText = `❌ 答錯囉！正確答案是：${currentAnswer}`;
            feedbackEl.className = 'feedback wrong';
            document.getElementById('space-hint').classList.remove('hidden');
            saveDataToFirebase();
            
            isWaitingForNext = true;
        }

        updateScoreboard();
    }

    function updateScoreboard() {
        document.getElementById('lbl-total').innerText = currentData.total;
        document.getElementById('lbl-correct').innerText = currentData.correct;
        document.getElementById('lbl-wrong').innerText = currentData.wrong;
        
        let rate = currentData.total === 0 ? 0 : Math.round((currentData.correct / currentData.total) * 100);
        document.getElementById('lbl-rate').innerText = rate;
    }

    document.addEventListener('keydown', function(event) {
        if (document.getElementById('quiz-stage').classList.contains('hidden')) return;

        if (event.key === 'Enter') {
            if (!isWaitingForNext) {
                checkAnswer();
            }
        } else if (event.key === ' ' || event.code === 'Space') {
            if (isWaitingForNext && document.getElementById('lbl-wrong').innerText != currentData.wrong - 1) {
                event.preventDefault();
                generateQuestion();
            }
        }
    });

    function exitGame() {
        document.getElementById('quiz-stage').classList.add('hidden');
        document.getElementById('login-stage').classList.remove('hidden');
    }

    // 將資料即時更新寫入 Firebase Realtime Database
    function saveDataToFirebase() {
        let rate = Math.round((currentData.correct / currentData.total) * 100);
        let modeText = currentData.mode === 'basic' ? '基礎' : '進階';
        
        if (database) {
            database.ref('quiz_records/' + currentData.name + '/' + modeText).set({
                name: currentData.name,
                mode: modeText,
                total: currentData.total,
                correct: currentData.correct,
                wrong: currentData.wrong,
                rate: rate + '%',
                lastUpdate: new Date().toLocaleString()
            }).then(() => {
                console.log("資料已成功同步至 Firebase 雲端！");
            }).catch((error) => {
                console.error("同步失敗：", error);
            });
        } else {
            console.warn("Firebase 未連線，無法同步。");
        }
    }
</script>

</body>
</html>
