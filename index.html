<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正負數加減法綜合練習場</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 580px;
        }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        h2 { color: #e67e22; margin-top: 5px; font-size: 20px; }
        .hidden { display: none !important; }
        
        input[type="text"], input[type="number"] {
            font-size: 20px;
            padding: 12px;
            width: 80%;
            margin-bottom: 15px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            text-align: center;
        }
        
        button {
            font-size: 18px;
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            margin: 5px;
        }
        .btn-basic { background-color: #3498db; }
        .btn-basic:hover { background-color: #2980b9; }
        .btn-advance { background-color: #9b59b6; }
        .btn-advance:hover { background-color: #8e44ad; }
        .btn-contest { background-color: #e74c3c; font-weight: bold; }
        .btn-contest:hover { background-color: #c0392b; }
        .btn-submit { background-color: #27ae60; }
        .btn-submit:hover { background-color: #219653; }
        .btn-nav { background-color: #95a5a6; }
        .btn-nav:hover { background-color: #7f8c8d; }
        .btn-again { background-color: #27ae60; font-weight: bold; }
        .btn-again:hover { background-color: #219653; }
        
        .timer-box {
            font-size: 26px;
            font-weight: bold;
            color: #e74c3c;
            background-color: #fadbd8;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
            font-size: 16px;
        }

        .quiz-section { margin: 20px 0; }
        .question { font-size: 42px; font-weight: bold; color: #2c3e50; margin-bottom: 15px; }
        .feedback { font-size: 20px; font-weight: bold; min-height: 30px; }
        .correct { color: #27ae60; }
        .wrong { color: #c0392b; }
        .hint { font-size: 14px; color: #7f8c8d; margin-top: 10px; }

        /* 排行榜外框 */
        .leaderboard {
            margin-top: 25px;
            text-align: left;
            background-color: #fcf3cf;
            padding: 15px;
            border-radius: 8px;
            border: 2px dashed #f1c40f;
        }
        
        .tab-container {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
            gap: 5px;
        }
        .tab-btn {
            flex: 1;
            font-size: 14px;
            padding: 8px 2px;
            background-color: #f9e79f;
            color: #7d6608;
            border: 1px solid #f1c40f;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            margin: 0;
        }
        .tab-btn.active {
            background-color: #e67e22;
            color: white;
            border-color: #d35400;
        }
        
        .leaderboard-scroll {
            max-height: 380px; 
            overflow-y: auto;  
            border-radius: 6px;
            background-color: #fffdf5;
            padding: 5px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .rank-table th {
            position: sticky;
            top: 0;
            background-color: #f9e79f;
            color: #7d6608;
            z-index: 10;
        }
        .rank-table th, .rank-table td {
            padding: 8px 3px;
            text-align: center;
            border-bottom: 1px solid #f9e79f;
        }
        .top1 { font-weight: bold; color: #d4ac0d; background-color: #fef9e7; }

        .dot-container {
            display: inline-flex;
            gap: 3px;
            justify-content: center;
            align-items: center;
            vertical-align: middle;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            background-color: #e0e0e0;
            position: relative;
            cursor: help;
        }
        .dot.active {
            background-color: #2ecc71;
        }
        /* 1. 懸浮提示小卡片（改為向左側展開，利用左邊名字的空間） */
        .dot::after {
            content: attr(data-tip);
            position: absolute;
            
            /* 定位在圓點的左側，避開右邊邊界與上方頂部 */
            right: 120%;
            left: auto;
            top: -10px;                /* 微調高度，讓它看起來更協調 */
            
            background-color: rgba(44, 62, 80, 0.95);
            color: white;
            padding: 8px 12px;
            font-size: 11px;
            line-height: 1.5;
            border-radius: 6px;
            
            /* 換行與寬度保護 */
            white-space: pre-wrap;     /* 保留 \n 換行 */
            min-width: 210px;          /* 限制最小寬度 */
            width: max-content;        /* 依文字長度自動撐開 */
            
            text-align: left;          /* 文字靠左對齊 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.25);
            opacity: 0;                /* 預設隱藏 */
            pointer-events: none;      /* 防止滑鼠卡到懸浮框 */
            transition: opacity 0.1s;
            z-index: 99;
        }

        /* 2. 控制滑鼠劃過去時顯示 */
        .dot:hover::after {
            opacity: 1 !important;
        
        }
        
        .count-badge {
            font-size: 11px;
            color: #888;
            font-weight: normal;
            margin-left: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-stage">
        <h1>正負數加減法練習</h1>
        <h2>請輸入名字並選擇模式：</h2>
        <input type="text" id="username" placeholder="請輸入你的名字" autofocus autocomplete="off">
        <br>
        <button onclick="startGame('basic')" class="btn-basic">基礎練習 (不限時/2個數)</button>
        <button onclick="startGame('advanced')" class="btn-advance">進階練習 (不限時/3個數)</button>
        <hr style="border: 0; border-top: 1px dashed #bdc3c7; margin: 20px 0;">
        <button onclick="startGame('contest')" class="btn-contest" style="font-size: 20px; padding: 12px 25px;">⏱️ 1分鐘限時挑戰賽</button>

        <div class="leaderboard">
            <div class="tab-container">
                <button id="tab-home-week" class="tab-btn active" onclick="switchTab('home', 'week')">🔥 本週勤奮榜 (看天數)</button>
                <button id="tab-home-today" class="tab-btn" onclick="switchTab('home', 'today')">📅 今日即時榜</button>
                <button id="tab-home-history" class="tab-btn" onclick="switchTab('home', 'history')">📜 歷史總排行</button>
            </div>
            
            <div class="leaderboard-scroll">
                <table class="rank-table">
                    <thead>
                        <tr>
                            <th width="10%" id="th-home-rank">名次</th>
                            <th width="28%" id="th-home-name">名字</th>
                            <th width="36%" id="th-header-type">近7日打卡跡象 (右為今天)</th>
                            <th width="13%" id="th-home-score">答對</th>
                            <th width="13%" id="th-home-rate">正確率</th>
                        </tr>
                    </thead>
                    <tbody id="home-leaderboard-body">
                        <tr><td colspan="5">排行榜載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="quiz-stage" class="hidden">
        <div id="timer-wrapper" class="timer-box hidden">剩餘時間：<span id="timer-sec">60</span> 秒</div>
        
        <div class="scoreboard">
            <div>參賽學生: <span id="lbl-name">-</span></div>
            <div>目前模式: <span id="lbl-mode" style="font-weight:bold; color:#2980b9;">-</span></div>
            <div>答對題數: <span id="lbl-correct" style="color:#27ae60; font-weight:bold;">0</span> 題</div>
            <div id="wrong-box-title">答錯題數: <span id="lbl-wrong">0</span> 題</div>
            <div style="grid-column: span 2; text-align: center; font-weight: bold;">
                正確率: <span id="lbl-rate">0</span>% (總答題: <span id="lbl-total">0</span>)
            </div>
        </div>

        <div class="quiz-section">
            <div class="question" id="question-text">(-5) + 12 = ?</div>
            <input type="number" id="user-answer" placeholder="請輸入答案" autocomplete="off">
            <br>
            <button id="btn-submit" onclick="checkAnswer()" class="btn-submit">送出答案 (Enter)</button>
            <div class="feedback" id="feedback-text"></div>
            <div class="hint hidden" id="space-hint">請按 【空白鍵 Space】 進入下一題</div>
        </div>
        <button onclick="exitGame()" class="btn-nav" style="margin-top:15px;">返回主選單</button>
    </div>

    <div id="result-stage" class="hidden">
        <h1 style="color: #e74c3c;">⏱️ 時間到！挑戰結束</h1>
        <div class="scoreboard" style="background-color: #eaecee; margin-top: 20px;">
            <div style="grid-column: span 2; font-size: 20px; text-align: center; font-weight: bold; color: #2c3e50;">
                你的最終戰績：答對 <span id="final-correct" style="color:#27ae60; font-size:26px;">0</span> 題
            </div>
            <div>嘗試總次數: <span id="final-total">0</span> 次</div>
            <div>最終正確率: <span id="final-rate">0</span>%</div>
        </div>
        
        <button onclick="restartGame()" class="btn-again">🔥 再挑戰一次 </button>
        <button onclick="exitGame()" class="btn-nav">🏠 返回主選單</button>

        <div class="leaderboard">
            <div class="tab-container">
                <button id="tab-result-week" class="tab-btn active" onclick="switchTab('result', 'week')">🔥 本週勤奮榜</button>
                <button id="tab-result-today" class="tab-btn" onclick="switchTab('result', 'today')">📅 今日即時榜</button>
                <button id="tab-result-history" class="tab-btn" onclick="switchTab('result', 'history')">📜 歷史總排行</button>
            </div>

            <div class="leaderboard-scroll">
                <table class="rank-table">
                    <thead>
                        <tr>
                            <th width="10%" id="th-result-rank">名次</th>
                            <th width="28%" id="th-result-name">名字</th>
                            <th width="36%" id="th-result-header-type">近7日打卡跡象</th>
                            <th width="13%" id="th-result-score">答對</th>
                            <th width="13%" id="th-result-rate">正確率</th>
                        </tr>
                    </thead>
                    <tbody id="result-leaderboard-body">
                        <tr><td colspan="5">排行榜載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // Firebase 金鑰配置 
    const firebaseConfig = {
        apiKey: "AIzaSyBVsWn1_ejMdHsqsYLkaDQHYXyraDeQD_U",
        authDomain: "math-quiz-f0e5b.firebaseapp.com",
        databaseURL: "https://math-quiz-f0e5b-default-rtdb.firebaseio.com",
        projectId: "math-quiz-f0e5b",
        storageBucket: "math-quiz-f0e5b.firebasestorage.app",
        messagingSenderId: "657003713715",
        appId: "1:657003713715:web:122ea4c0653d15753d4cc6"
    };
    
    let database = null;
    if (typeof firebase !== 'undefined') {
        firebase.initializeApp(firebaseConfig);
        database = firebase.database();
    }

    let currentData = { name: '', mode: 'basic', total: 0, correct: 0, wrong: 0 };
    let currentAnswer = 0;
    let isWaitingForNext = false; 
    let timeLeft = 60;
    let timerInterval = null;
    let currentTabs = { home: 'week', result: 'week' };

    // 方案 B：練習模式本地累計暫存器
    let practiceBuffer = { correct: 0, total: 0 };

    window.onload = function() {
        switchTab('home', 'week');
        switchTab('result', 'week');
    };

    // 切換分頁時，動態顯示/隱藏「正確率」欄位並重新規劃比例
    function switchTab(stage, type) {
        currentTabs[stage] = type;
        document.getElementById(`tab-${stage}-week`).classList.remove('active');
        document.getElementById(`tab-${stage}-today`).classList.remove('active');
        document.getElementById(`tab-${stage}-history`).classList.remove('active');
        document.getElementById(`tab-${stage}-${type}`).classList.add('active');
        
        const nameTh = document.getElementById(stage === 'home' ? 'th-home-name' : 'th-result-name');
        const centerTh = document.getElementById(stage === 'home' ? 'th-header-type' : 'th-result-header-type');
        const scoreTh = document.getElementById(stage === 'home' ? 'th-home-score' : 'th-result-score');
        const rateTh = document.getElementById(stage === 'home' ? 'th-home-rate' : 'th-result-rate');

        if (type === 'week') {
            centerTh.innerText = "近7日打卡跡象 (右為今天)";
            rateTh.style.display = 'none'; // 隱藏正確率欄位
            
            // 重新分配剩餘欄位的寬度比例
            nameTh.style.width = "33%";
            centerTh.style.width = "42%";
            scoreTh.style.width = "15%";
        } else {
            if (type === 'today') centerTh.innerText = "本次挑戰詳細時分秒";
            else centerTh.innerText = "歷史挑戰日期紀錄";
            rateTh.style.display = ''; // 顯示正確率欄位
            
            // 還原原本含正確率欄位的寬度比例
            nameTh.style.width = "28%";
            centerTh.style.width = "36%";
            scoreTh.style.width = "13%";
        }

        loadLeaderboardData(`${stage}-leaderboard-body`, type);
    }

    function startGame(mode) {
        const nameInput = document.getElementById('username').value.trim();
        if (!nameInput) { alert('請先輸入名字喔！'); return; }
        currentData.name = nameInput;
        currentData.mode = mode;
        executeStart();
    }

    function restartGame() {
        if (!currentData.name) { exitGame(); return; }
        executeStart();
    }

    function executeStart() {
        currentData.total = 0;
        currentData.correct = 0;
        currentData.wrong = 0;
        isWaitingForNext = false;

        // 重置本地端練習暫存器
        practiceBuffer.correct = 0;
        practiceBuffer.total = 0;

        document.getElementById('lbl-name').innerText = currentData.name;
        let modeTitle = '基礎練習';
        if(currentData.mode === 'advanced') modeTitle = '進階練習';
        if(currentData.mode === 'contest') modeTitle = '⏱️ 1分鐘競賽';
        document.getElementById('lbl-mode').innerText = modeTitle;

        if (currentData.mode === 'contest') {
            document.getElementById('timer-wrapper').classList.remove('hidden');
            document.getElementById('wrong-box-title').innerHTML = `嘗試次數: <span id="lbl-wrong">0</span> 次`;
            timeLeft = 60;
            document.getElementById('timer-sec').innerText = timeLeft;
        } else {
            document.getElementById('timer-wrapper').classList.add('hidden');
            document.getElementById('wrong-box-title').innerHTML = `答錯題數: <span id="lbl-wrong">0</span> 題`;
        }

        updateScoreboard();
        document.getElementById('login-stage').classList.add('hidden');
        document.getElementById('result-stage').classList.add('hidden');
        document.getElementById('quiz-stage').classList.remove('hidden');
        generateQuestion();

        if (currentData.mode === 'contest') {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-sec').innerText = timeLeft;
                if (timeLeft <= 0) { clearInterval(timerInterval); endContest(); }
            }, 1000);
        }
    }

    function getRandomNumWithoutZero() {
        let num = 0;
        while (num === 0) { num = Math.floor(Math.random() * 21) - 10; }
        return num;
    }
    function getRandomOp() { return Math.random() < 0.5 ? '+' : '-'; }
    function formatNum(num) { return num < 0 ? `(${num})` : num; }

    function isSimpleQuiz(n1, op, n2) {
        if (op === '+' && n1 > 0 && n2 > 0) return true;
        if (op === '-' && n1 > 0 && n2 > 0 && n1 > n2) return true;
        return false;
    }

    function generateQuestion() {
        isWaitingForNext = false;
        document.getElementById('feedback-text').className = 'feedback';
        document.getElementById('feedback-text').innerText = '';
        document.getElementById('space-hint').classList.add('hidden');
        const ansInput = document.getElementById('user-answer');
        ansInput.value = ''; ansInput.disabled = false; ansInput.focus();
        document.getElementById('btn-submit').disabled = false;

        let qText = '';
        if (currentData.mode === 'basic' || currentData.mode === 'contest') {
            let n1, n2, op;
            do { n1 = getRandomNumWithoutZero(); n2 = getRandomNumWithoutZero(); op = getRandomOp(); } while (isSimpleQuiz(n1, op, n2));
            qText = `${formatNum(n1)} ${op} ${formatNum(n2)} = ?`;
            currentAnswer = op === '+' ? n1 + n2 : n1 - n2;
        } else if (currentData.mode === 'advanced') {
            let n1, n2, n3, op1, op2, temp;
            do { n1 = getRandomNumWithoutZero(); n2 = getRandomNumWithoutZero(); op1 = getRandomOp(); } while (isSimpleQuiz(n1, op1, n2));
            temp = op1 === '+' ? n1 + n2 : n1 - n2;
            do { n3 = getRandomNumWithoutZero(); op2 = getRandomOp(); } while (isSimpleQuiz(temp, op2, n3));
            qText = `${formatNum(n1)} ${op1} ${formatNum(n2)} ${op2} ${formatNum(n3)} = ?`;
            currentAnswer = op2 === '+' ? temp + n3 : temp - n3;
        }
        document.getElementById('question-text').innerText = qText;
    }

    function checkAnswer() {
        if (currentData.mode !== 'contest' && isWaitingForNext) return;
        const userInput = document.getElementById('user-answer').value;
        if (userInput === '') { alert('請輸入答案！'); return; }

        const userAnswer = parseInt(userInput, 10);
        currentData.total++;
        const feedbackEl = document.getElementById('feedback-text');
        const ansInput = document.getElementById('user-answer');

        if (currentData.mode === 'contest') {
            if (userAnswer === currentAnswer) {
                currentData.correct++;
                feedbackEl.innerText = '⭕ 答對了！';
                feedbackEl.className = 'feedback correct';
                setTimeout(() => { if (timeLeft > 0) generateQuestion(); }, 100);
            } else {
                feedbackEl.innerText = '❌ 算錯囉，再試一次！';
                feedbackEl.className = 'feedback wrong';
                ansInput.value = ''; ansInput.focus();
            }
        } else {
            // 基礎 / 進階練習模式的暫存累計
            practiceBuffer.total++;
            ansInput.disabled = true;
            document.getElementById('btn-submit').disabled = true;

            if (userAnswer === currentAnswer) {
                currentData.correct++;
                practiceBuffer.correct++;

                feedbackEl.innerText = '⭕ 太棒了！答對了！';
                feedbackEl.className = 'feedback correct';
                isWaitingForNext = true;

                // 方案 B 核心：練習中每答對滿 10 題，自動在背景存檔一筆
                if (practiceBuffer.correct >= 10) {
                    savePracticeBatch();
                }

                setTimeout(() => { if(isWaitingForNext) generateQuestion(); }, 2000);
            } else {
                currentData.wrong++;
                feedbackEl.innerText = `❌ 答錯囉！正確答案是：${currentAnswer}`;
                feedbackEl.className = 'feedback wrong';
                document.getElementById('space-hint').classList.remove('hidden');
                isWaitingForNext = true;
            }
        }
        updateScoreboard();
    }

    // 方案 B 自動背景存檔（滿10題或返回選單觸發）
    function savePracticeBatch() {
        if (!database || practiceBuffer.total === 0) return;
        const timestamp = new Date().getTime();
        const nowString = new Date().toLocaleString('zh-TW', { hour12: false });
        let modeText = currentData.mode === 'basic' ? '基礎' : '進階';

        database.ref('contest_records/' + timestamp).set({
            name: currentData.name,
            correct: practiceBuffer.correct,
            total: practiceBuffer.total,
            time: nowString,
            mode: modeText
        });

        // 存檔完成後，重置暫存計數器
        practiceBuffer.correct = 0;
        practiceBuffer.total = 0;
    }

    function updateScoreboard() {
        document.getElementById('lbl-correct').innerText = currentData.correct;
        document.getElementById('lbl-total').innerText = currentData.total;
        if (currentData.mode === 'contest') document.getElementById('lbl-wrong').innerText = currentData.total; 
        else document.getElementById('lbl-wrong').innerText = currentData.wrong; 
        let rate = currentData.total === 0 ? 0 : Math.round((currentData.correct / currentData.total) * 100);
        document.getElementById('lbl-rate').innerText = rate;
    }

    function endContest() {
        clearInterval(timerInterval);
        document.getElementById('user-answer').blur();
        document.getElementById('quiz-stage').classList.add('hidden');
        document.getElementById('result-stage').classList.remove('hidden');
        document.getElementById('final-correct').innerText = currentData.correct;
        document.getElementById('final-total').innerText = currentData.total;
        let rate = currentData.total === 0 ? 0 : Math.round((currentData.correct / currentData.total) * 100);
        document.getElementById('final-rate').innerText = rate;
        saveContestDataAndLoadLeaderboard();
    }

    document.addEventListener('keydown', function(event) {
        if (document.getElementById('quiz-stage').classList.contains('hidden')) return;
        if (event.key === 'Enter') { if (currentData.mode === 'contest' || !isWaitingForNext) { checkAnswer(); } } 
        else if (event.key === ' ' || event.code === 'Space') {
            if (currentData.mode !== 'contest' && isWaitingForNext) { event.preventDefault(); generateQuestion(); }
        }
    });

    function exitGame() {
        clearInterval(timerInterval);
        
        // 返回主選單前，若練習模式有任何剩餘題數，立刻打包上傳最後一筆
        if (currentData.mode !== 'contest' && practiceBuffer.total > 0) {
            savePracticeBatch();
        }

        document.getElementById('quiz-stage').classList.add('hidden');
        document.getElementById('result-stage').classList.add('hidden');
        document.getElementById('login-stage').classList.remove('hidden');
        document.getElementById('username').value = '';
        switchTab('home', 'week');
    }

    function getPast7Days() {
        let dates = [];
        for (let i = 6; i >= 0; i--) {
            let d = new Date();
            d.setDate(d.getDate() - i);
            dates.push(d.toLocaleDateString('zh-TW'));
        }
        return dates;
    }

    function loadLeaderboardData(elementId, filterType) {
        if (!database) return;
        database.ref('contest_records').once('value', (snapshot) => {
            const todayStr = new Date().toLocaleDateString('zh-TW');
            const past7Days = getPast7Days();
            
            let studentMap = {};

            snapshot.forEach((childSnapshot) => {
                let data = childSnapshot.val();
                let name = data.name ? data.name.trim() : '匿名';
                let correct = parseInt(data.correct || 0, 10);
                let total = parseInt(data.total || correct || 1, 10);
                let timeStr = data.time || '';
                let datePart = timeStr.split(' ')[0] || '';
                let recordMode = data.mode || '挑戰'; // 相容舊數據預設為挑戰

                if (!studentMap[name]) {
                    studentMap[name] = {
                        name: name,
                        historyMaxCorrect: 0, totalAnsOfMax: 0, maxRate: 0, maxTime: '',
                        historyTotalCount: 0,
                        todayMaxCorrect: 0, todayTotalAns: 0, todayRate: 0, todayTime: '',
                        todayCount: 0,
                        weekActiveDays: 0, weekTotalCorrect: 0,
                        dayRecords: {}
                    };
                    // 初始化 7 日打卡容器，包含三種模式的子計數器
                    past7Days.forEach(d => {
                        studentMap[name].dayRecords[d] = { 
                            correct: 0, 
                            total: 0,
                            basic: { correct: 0, total: 0, count: 0 },
                            advanced: { correct: 0, total: 0, count: 0 },
                            contest: { correct: 0, total: 0, count: 0 }
                        };
                    });
                }

                let s = studentMap[name];

                // 1. 本週勤奮榜：統計近 7 日全模式數據（基礎 + 進階 + 挑戰合併）
                if (s.dayRecords[datePart] !== undefined) {
                    s.dayRecords[datePart].correct += correct;
                    s.dayRecords[datePart].total += total;
                    
                    if (recordMode === '基礎') {
                        s.dayRecords[datePart].basic.correct += correct;
                        s.dayRecords[datePart].basic.total += total;
                        s.dayRecords[datePart].basic.count += 1;
                    } else if (recordMode === '進階') {
                        s.dayRecords[datePart].advanced.correct += correct;
                        s.dayRecords[datePart].advanced.total += total;
                        s.dayRecords[datePart].advanced.count += 1;
                    } else { // 挑戰
                        s.dayRecords[datePart].contest.correct += correct;
                        s.dayRecords[datePart].contest.total += total;
                        s.dayRecords[datePart].contest.count += 1;
                    }
                }

                // 2. 挑戰賽限定計算（用於今日即時榜與歷史排行）
                if (recordMode === '挑戰') {
                    s.historyTotalCount++;

                    // 歷史最佳紀錄統計（答對同分時，正確率高者為佳）
                    if (correct > s.historyMaxCorrect || (correct === s.historyMaxCorrect && (correct/total) > (s.historyMaxCorrect/s.totalAnsOfMax))) {
                        s.historyMaxCorrect = correct;
                        s.totalAnsOfMax = total;
                        s.maxRate = Math.round((correct / total) * 100);
                        s.maxTime = timeStr;
                    }

                    // 今日數據統計（答對同分時，正確率高者為佳）
                    if (timeStr.startsWith(todayStr)) {
                        s.todayCount++;
                        if (correct > s.todayMaxCorrect || (correct === s.todayMaxCorrect && (correct/total) > (s.todayMaxCorrect/s.todayTotalAns))) {
                            s.todayMaxCorrect = correct;
                            s.todayTotalAns = total;
                            s.todayRate = Math.round((correct / total) * 100);
                            s.todayTime = timeStr.includes(' ') ? timeStr.split(' ')[1] : timeStr;
                        }
                    }
                }
            });

            let allStudents = Object.values(studentMap);
            allStudents.forEach(s => {
                let activeDays = 0;
                past7Days.forEach(d => { if (s.dayRecords[d].correct > 0) activeDays++; });
                s.weekActiveDays = activeDays;
            });

            let displayList = [];
            if (filterType === 'week') {
                allStudents.forEach(s => {
                    let total7DaysCorrect = 0;
                    past7Days.forEach(d => total7DaysCorrect += s.dayRecords[d].correct);
                    s.weekTotalCorrect = total7DaysCorrect;
                });
                displayList = allStudents.filter(s => s.weekActiveDays > 0);
                displayList.sort((a, b) => {
                    if (b.weekActiveDays !== a.weekActiveDays) return b.weekActiveDays - a.weekActiveDays;
                    return b.weekTotalCorrect - a.weekTotalCorrect;
                });
            } 
            else if (filterType === 'today') {
                displayList = allStudents.filter(s => s.todayMaxCorrect > 0);
                // 今日即時榜排序優先權：1. 答對題數(大到小) 2. 正確率(大到小)
                displayList.sort((a, b) => {
                    if (b.todayMaxCorrect !== a.todayMaxCorrect) {
                        return b.todayMaxCorrect - a.todayMaxCorrect;
                    }
                    return b.todayRate - a.todayRate;
                });
            } 
            else {
                displayList = allStudents.filter(s => s.historyMaxCorrect > 0);
                // 歷史總排行排序優先權：1. 答對題數(大到小) 2. 正確率(大到小)
                displayList.sort((a, b) => {
                    if (b.historyMaxCorrect !== a.historyMaxCorrect) {
                        return b.historyMaxCorrect - a.historyMaxCorrect;
                    }
                    return b.maxRate - a.maxRate;
                });
            }

            const tbody = document.getElementById(elementId);
            if (!tbody) return;
            tbody.innerHTML = '';

            const currentColspan = filterType === 'week' ? 4 : 5;
            if (displayList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${currentColspan}">目前尚無相關紀錄</td></tr>`;
                return;
            }

            let limit = filterType === 'history' ? 500 : 100;
            displayList.slice(0, limit).forEach((record, index) => {
                let rowClass = index === 0 ? 'class="top1"' : '';
                
                let displayName = record.name;
                let centerTdContent = ''; 
                let scoreText = '';
                let rateTdHtml = ''; 

                if (filterType === 'today') {
                    displayName += `<span class="count-badge">(今練 ${record.todayCount} 次)</span>`;
                } 

                if (filterType === 'week') {
                    let dotsHtml = '<div class="dot-container">';
                    past7Days.forEach(d => {
                        let dayData = record.dayRecords[d];
                        let score = dayData.correct;
                        let total = dayData.total;
                        let wrong = Math.max(0, total - score);
                        let shortDate = d.substring(d.indexOf('/') + 1);
                        
                        if (score > 0) {
                            // 組裝多模式動態懸浮框文字
                            let tipText = `${shortDate} 總計：答對 ${score} 題, 答錯 ${wrong} 題\n------------------------------`;
                            
                            // 基礎練習
                            if (dayData.basic.count > 0) {
                                let rate = dayData.basic.total === 0 ? 0 : Math.round((dayData.basic.correct / dayData.basic.total) * 100);
                                tipText += `\n📘 基礎: 練習 ${dayData.basic.count} 次, 答對 ${dayData.basic.correct} 題 (正確率 ${rate}%)`;
                            }
                            // 進階練習
                            if (dayData.advanced.count > 0) {
                                let rate = dayData.advanced.total === 0 ? 0 : Math.round((dayData.advanced.correct / dayData.advanced.total) * 100);
                                tipText += `\n📗 進階: 練習 ${dayData.advanced.count} 次, 答對 ${dayData.advanced.correct} 題 (正確率 ${rate}%)`;
                            }
                            // 挑戰賽
                            if (dayData.contest.count > 0) {
                                let rate = dayData.contest.total === 0 ? 0 : Math.round((dayData.contest.correct / dayData.contest.total) * 100);
                                let avgCorrect = (dayData.contest.correct / dayData.contest.count).toFixed(1);
                                tipText += `\n⏱️ 挑戰: 練習 ${dayData.contest.count} 次, 答對 ${dayData.contest.correct} 題 (正確率 ${rate}% / 均對 ${avgCorrect} 題)`;
                            }

                            dotsHtml += `<span class="dot active" data-tip="${tipText}"></span>`;
                        } else {
                            dotsHtml += `<span class="dot" data-tip="${shortDate}: 未練習"></span>`;
                        }
                    });
                    dotsHtml += '</div>';
                    centerTdContent = dotsHtml + ` <span style="font-size:11px;color:#7f8c8d;">(${record.weekActiveDays}天)</span>`;
                    scoreText = `${record.weekTotalCorrect} 題`;
                    rateTdHtml = ''; 
                } 
                else if (filterType === 'today') {
                    centerTdContent = `<span style="font-size:12px;color:#7f8c8d;">${record.todayTime}</span>`;
                    scoreText = `${record.todayMaxCorrect} 題`;
                    rateTdHtml = `<td style="font-weight:bold; color:#2980b9;">${record.todayRate}%</td>`;
                } 
                else {
                    let shortTime = record.maxTime.replace(/^\d{4}\//, ""); 
                    centerTdContent = `<span style="font-size:12px;color:#7f8c8d;">${shortTime}</span>`;
                    scoreText = `${record.historyMaxCorrect} 題`;
                    rateTdHtml = `<td style="font-weight:bold; color:#2980b9;">${record.maxRate}%</td>`;
                }

                tbody.innerHTML += `
                    <tr ${rowClass}>
                        <td>${index + 1}</td>
                        <td style="font-weight:bold; text-align:left; padding-left:8px;">${displayName}</td>
                        <td>${centerTdContent}</td>
                        <td style="font-weight:bold; color:#e74c3c;">${scoreText}</td>
                        ${rateTdHtml}
                    </tr>
                `;
            });
        });
    }

    function saveContestDataAndLoadLeaderboard() {
        if (!database) return;
        const timestamp = new Date().getTime();
        const nowString = new Date().toLocaleString('zh-TW', { hour12: false });

        database.ref('contest_records/' + timestamp).set({
            name: currentData.name,
            correct: currentData.correct,
            total: currentData.total,
            time: nowString,
            mode: '挑戰' // 標記為挑戰賽
        }).then(() => {
            let currentResultTab = currentTabs['result'];
            loadLeaderboardData('result-leaderboard-body', currentResultTab);
        });
    }
</script>
