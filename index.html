<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正負數加減法 - 1分鐘限時競賽</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        h2 { color: #e74c3c; margin-top: 5px; }
        .hidden { display: none !important; }
        
        input[type="text"], input[type="number"] {
            font-size: 20px;
            padding: 12px;
            width: 80%;
            margin-bottom: 15px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            text-align: center;
        }
        button {
            font-size: 18px;
            padding: 10px 20px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            margin: 5px;
        }
        button:hover { background-color: #219653; }
        
        /* 倒數計時器樣式 */
        .timer-box {
            font-size: 28px;
            font-weight: bold;
            color: #e74c3c;
            background-color: #fadbd8;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
            font-size: 16px;
        }

        .quiz-section { margin: 20px 0; }
        .question { font-size: 42px; font-weight: bold; color: #2c3e50; margin-bottom: 15px; }
        .feedback { font-size: 20px; font-weight: bold; min-height: 30px; }
        .correct { color: #27ae60; }
        .wrong { color: #c0392b; }

        /* 排行榜樣式 */
        .leaderboard {
            margin-top: 25px;
            text-align: left;
            background-color: #fcf3cf;
            padding: 20px;
            border-radius: 8px;
            border: 2px dashed #f1c40f;
        }
        .leaderboard h3 { margin-top: 0; color: #b7950b; text-align: center; font-size: 22px;}
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }
        .rank-table th, .rank-table td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #f9e79f;
        }
        .rank-table th { background-color: #f9e79f; color: #7d6608; }
        .top1 { font-weight: bold; color: #d4ac0d; background-color: #fef9e7; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-stage">
        <h1>正負數加減法</h1>
        <h2>⏱️ 1分鐘限時挑戰賽</h2>
        <p style="color: #7f8c8d;">答錯不會跳下一題，必須修正到對為止！<br>看誰在一分鐘內答對最多題！</p>
        <input type="text" id="username" placeholder="請輸入你的名字" autofocus autocomplete="off">
        <br>
        <button onclick="startChallenge()" style="font-size: 22px; padding: 12px 30px; background-color: #e67e22;">開始挑戰！</button>
    </div>

    <div id="quiz-stage" class="hidden">
        <div class="timer-box">剩餘時間：<span id="timer-sec">60</span> 秒</div>
        
        <div class="scoreboard">
            <div>參賽選手: <span id="lbl-name">-</span></div>
            <div>目前答對: <span id="lbl-correct" style="font-weight:bold; color:#27ae60;">0</span> 題</div>
            <div>嘗試次數: <span id="lbl-total">0</span> 次</div>
            <div>目前正確率: <span id="lbl-rate">0</span>%</div>
        </div>

        <div class="quiz-section">
            <div class="question" id="question-text">(-5) + 12 = ?</div>
            <input type="number" id="user-answer" placeholder="輸入答案後按 Enter" autocomplete="off">
            <br>
            <button id="btn-submit" onclick="checkAnswer()">送出答案</button>
            <div class="feedback" id="feedback-text"></div>
        </div>
    </div>

    <div id="result-stage" class="hidden">
        <h1 style="color: #e67e22;">⏱️ 時間到！挑戰結束</h1>
        <div class="scoreboard" style="background-color: #eaecee; margin-top: 20px;">
            <div style="grid-column: span 2; font-size: 20px; text-align: center; font-weight: bold; color: #2c3e50;">
                你的最終戰績：答對 <span id="final-correct" style="color:#27ae60; font-size:26px;">0</span> 題
            </div>
            <div>嘗試總次數: <span id="final-total">0</span> 次</div>
            <div>最終正確率: <span id="final-rate">0</span>%</div>
        </div>
        <button onclick="restartGame()" style="background-color: #3498db;">再挑戰一次</button>

        <div class="leaderboard">
            <h3>🏆 頂尖對決：前 20 名排行榜</h3>
            <table class="rank-table">
                <thead>
                    <tr>
                        <th width="15%">名次</th>
                        <th width="35%">名字</th>
                        <th width="20%">答對題數</th>
                        <th width="30%">挑戰時間</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr><td colspan="4">排行榜載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Firebase 金鑰配置 (已自動帶入你的專屬參數)
    const firebaseConfig = {
        apiKey: "AIzaSyBVsWn1_ejMdHsqsYLkaDQHYXyraDeQD_U",
        authDomain: "math-quiz-f0e5b.firebaseapp.com",
        databaseURL: "https://math-quiz-f0e5b-default-rtdb.firebaseio.com",
        projectId: "math-quiz-f0e5b",
        storageBucket: "math-quiz-f0e5b.firebasestorage.app",
        messagingSenderId: "657003713715",
        appId: "1:657003713715:web:122ea4c0653d15753d4cc6"
    };
    
    // 初始化 Firebase
    let database = null;
    if (typeof firebase !== 'undefined') {
        firebase.initializeApp(firebaseConfig);
        database = firebase.database();
    }

    // 遊戲狀態控制
    let gameData = { name: '', total: 0, correct: 0 };
    let currentAnswer = 0;
    let timeLeft = 60;
    let timerInterval = null;

    // 開始 1 分鐘挑戰
    function startChallenge() {
        const nameInput = document.getElementById('username').value.trim();
        if (!nameInput) {
            alert('請先輸入名字再開始挑戰喔！');
            return;
        }
        
        // 初始化數據
        gameData.name = nameInput;
        gameData.total = 0;
        gameData.correct = 0;
        timeLeft = 60;

        document.getElementById('lbl-name').innerText = gameData.name;
        document.getElementById('timer-sec').innerText = timeLeft;
        updateScoreboard();
        
        // 切換畫面
        document.getElementById('login-stage').classList.add('hidden');
        document.getElementById('result-stage').classList.add('hidden');
        document.getElementById('quiz-stage').classList.remove('hidden');
        
        generateQuestion();
        
        // 啟動倒數計時器
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-sec').innerText = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                endChallenge();
            }
        }, 1000);
    }

    function getRandomNum() { return Math.floor(Math.random() * 21) - 10; } // -10 ~ 10
    function getRandomOp() { return Math.random() < 0.5 ? '+' : '-'; }
    function formatNum(num) { return num < 0 ? `(${num})` : num; }

    // 生成題目（純基礎模式：2個數加減）
    function generateQuestion() {
        document.getElementById('feedback-text').innerText = '';
        const ansInput = document.getElementById('user-answer');
        ansInput.value = '';
        ansInput.focus();

        let n1 = getRandomNum();
        let n2 = getRandomNum();
        let op = getRandomOp();
        
        document.getElementById('question-text').innerText = `${formatNum(n1)} ${op} ${formatNum(n2)} = ?`;
        currentAnswer = op === '+' ? n1 + n2 : n1 - n2;
    }

    // 檢查答案（答錯不跳題，要求學生修正到對為止，培養精準度與反應速度）
    function checkAnswer() {
        const userInput = document.getElementById('user-answer').value;
        if (userInput === '') return;

        const userAnswer = parseInt(userInput, 10);
        gameData.total++;

        const feedbackEl = document.getElementById('feedback-text');

        if (userAnswer === currentAnswer) {
            gameData.correct++;
            feedbackEl.innerText = '⭕ 答對了！';
            feedbackEl.className = 'feedback correct';
            
            // 答對了，100毫秒後自動切換下一題
            setTimeout(() => {
                if (timeLeft > 0) generateQuestion();
            }, 100);
        } else {
            feedbackEl.innerText = '❌ 算錯囉，再試一次！';
            feedbackEl.className = 'feedback wrong';
            const ansInput = document.getElementById('user-answer');
            ansInput.value = '';
            ansInput.focus();
        }
        updateScoreboard();
    }

    function updateScoreboard() {
        document.getElementById('lbl-correct').innerText = gameData.correct;
        document.getElementById('lbl-total').innerText = gameData.total;
        let rate = gameData.total === 0 ? 0 : Math.round((gameData.correct / gameData.total) * 100);
        document.getElementById('lbl-rate').innerText = rate + '%';
    }

    // 挑戰結束
    function endChallenge() {
        // 鎖定輸入
        document.getElementById('user-answer').blur();
        document.getElementById('quiz-stage').classList.add('hidden');
        document.getElementById('result-stage').classList.remove('hidden');

        // 顯示個人成績
        document.getElementById('final-correct').innerText = gameData.correct;
        document.getElementById('final-total').innerText = gameData.total;
        let rate = gameData.total === 0 ? 0 : Math.round((gameData.correct / gameData.total) * 100);
        document.getElementById('final-rate').innerText = rate + '%';

        // 寫入 Firebase 並讀取前 20 名排行榜
        saveToFirebaseAndLoadLeaderboard();
    }

    // 儲存至 Firebase 並撈取前20名
    function saveToFirebaseAndLoadLeaderboard() {
        if (!database) return;

        // 1. 先寫入本次挑戰紀錄（以時間戳記為Key，避免同名的學生互相覆蓋歷史最佳紀錄）
        const timestamp = new Date().getTime();
        const nowString = new Date().toLocaleString('zh-TW', { hour12: false });

        database.ref('contest_records/' + timestamp).set({
            name: gameData.name,
            correct: gameData.correct,
            total: gameData.total,
            time: nowString
        }).then(() => {
            // 2. 寫入成功後，撈取所有紀錄進行排序，並取出
