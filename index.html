<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正負數加減法綜合練習場</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        h2 { color: #e67e22; margin-top: 5px; font-size: 20px; }
        .hidden { display: none !important; }
        
        input[type="text"], input[type="number"] {
            font-size: 20px;
            padding: 12px;
            width: 80%;
            margin-bottom: 15px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            text-align: center;
        }
        
        /* 按鈕樣式 */
        button {
            font-size: 18px;
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            margin: 5px;
        }
        .btn-basic { background-color: #3498db; }
        .btn-basic:hover { background-color: #2980b9; }
        .btn-advance { background-color: #9b59b6; }
        .btn-advance:hover { background-color: #8e44ad; }
        .btn-contest { background-color: #e74c3c; font-weight: bold; }
        .btn-contest:hover { background-color: #c0392b; }
        .btn-submit { background-color: #27ae60; }
        .btn-submit:hover { background-color: #219653; }
        .btn-nav { background-color: #95a5a6; }
        .btn-nav:hover { background-color: #7f8c8d; }
        
        /* 倒數計時器 */
        .timer-box {
            font-size: 26px;
            font-weight: bold;
            color: #e74c3c;
            background-color: #fadbd8;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
            font-size: 16px;
        }

        .quiz-section { margin: 20px 0; }
        .question { font-size: 42px; font-weight: bold; color: #2c3e50; margin-bottom: 15px; }
        .feedback { font-size: 20px; font-weight: bold; min-height: 30px; }
        .correct { color: #27ae60; }
        .wrong { color: #c0392b; }
        .hint { font-size: 14px; color: #7f8c8d; margin-top: 10px; }

        /* 排行榜 */
        .leaderboard {
            margin-top: 25px;
            text-align: left;
            background-color: #fcf3cf;
            padding: 20px;
            border-radius: 8px;
            border: 2px dashed #f1c40f;
        }
        .leaderboard h3 { margin-top: 0; color: #b7950b; text-align: center; font-size: 22px;}
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }
        .rank-table th, .rank-table td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #f9e79f;
        }
        .rank-table th { background-color: #f9e79f; color: #7d6608; }
        .top1 { font-weight: bold; color: #d4ac0d; background-color: #fef9e7; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-stage">
        <h1>正負數加減法練習</h1>
        <h2>請輸入名字並選擇模式：</h2>
        <input type="text" id="username" placeholder="請輸入你的名字" autofocus autocomplete="off">
        <br><
        <button onclick="startGame('basic')" class="btn-basic">基礎練習 (不限時/2個數)</button>
        <button onclick="startGame('advanced')" class="btn-advance">進階練習 (不限時/3個數)</button>
        <hr style="border: 0; border-top: 1px dashed #bdc3c7; margin: 20px 0;">
        <button onclick="startGame('contest')" class="btn-contest" style="font-size: 20px; padding: 12px 25px;">⏱️ 1分鐘限時挑戰賽</button>
    </div>

    <div id="quiz-stage" class="hidden">
        <div id="timer-wrapper" class="timer-box hidden">剩餘時間：<span id="timer-sec">60</span> 秒</div>
        
        <div class="scoreboard">
            <div>參賽學生: <span id="lbl-name">-</span></div>
            <div>目前模式: <span id="lbl-mode" style="font-weight:bold; color:#2980b9;">-</span></div>
            <div>答對題數: <span id="lbl-correct" style="color:#27ae60; font-weight:bold;">0</span> 題</div>
            <div id="wrong-box-title">答錯題數: <span id="lbl-wrong">0</span> 題</div>
            <div style="grid-column: span 2; text-align: center; font-weight: bold;">
                正確率: <span id="lbl-rate">0</span>% (總答題: <span id="lbl-total">0</span>)
            </div>
        </div>

        <div class="quiz-section">
            <div class="question" id="question-text">(-5) + 12 = ?</div>
            <input type="number" id="user-answer" placeholder="請輸入答案" autocomplete="off">
            <br>
            <button id="btn-submit" onclick="checkAnswer()" class="btn-submit">送出答案 (Enter)</button>
            <div class="feedback" id="feedback-text"></div>
            <div class="hint hidden" id="space-hint">請按 【空白鍵 Space】 進入下一題</div>
        </div>
        <button onclick="exitGame()" class="btn-nav" style="margin-top:15px;">返回主選單</button>
    </div>

    <div id="result-stage" class="hidden">
        <h1 style="color: #e74c3c;">⏱️ 時間到！挑戰結束</h1>
        <div class="scoreboard" style="background-color: #eaecee; margin-top: 20px;">
            <div style="grid-column: span 2; font-size: 20px; text-align: center; font-weight: bold; color: #2c3e50;">
                你的最終戰績：答對 <span id="final-correct" style="color:#27ae60; font-size:26px;">0</span> 題
            </div>
            <div>嘗試總次數: <span id="final-total">0</span> 次</div>
            <div>最終正確率: <span id="final-rate">0</span>%</div>
        </div>
        <button onclick="exitGame()" class="btn-basic">再挑戰一次 / 回主選單</button>

        <div class="leaderboard">
            <h3>🏆 頂尖對決：前 20 名排行榜</h3>
            <table class="rank-table">
                <thead>
                    <tr>
                        <th width="15%">名次</th>
                        <th width="35%">名字</th>
                        <th width="20%">答對題數</th>
                        <th width="30%">挑戰時間</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr><td colspan="4">排行榜載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Firebase 金鑰配置 (已自動綁定)
    const firebaseConfig = {
        apiKey: "AIzaSyBVsWn1_ejMdHsqsYLkaDQHYXyraDeQD_U",
        authDomain: "math-quiz-f0e5b.firebaseapp.com",
        databaseURL: "https://math-quiz-f0e5b-default-rtdb.firebaseio.com",
        projectId: "math-quiz-f0e5b",
        storageBucket: "math-quiz-f0e5b.firebasestorage.app",
        messagingSenderId: "657003713715",
        appId: "1:657003713715:web:122ea4c0653d15753d4cc6"
    };
    
    // 初始化 Firebase
    let database = null;
    if (typeof firebase !== 'undefined') {
        firebase.initializeApp(firebaseConfig);
        database = firebase.database();
    }

    // 遊戲核心變數
    let currentData = { name: '', mode: 'basic', total: 0, correct: 0, wrong: 0 };
    let currentAnswer = 0;
    let isWaitingForNext = false; // 用於非競賽模式的卡題機制
    let timeLeft = 60;
    let timerInterval = null;

    // 啟動遊戲 (依據選擇的模式)
    function startGame(mode) {
        const nameInput = document.getElementById('username').value.trim();
        if (!nameInput) {
            alert('請先輸入名字喔！');
            return;
        }
        
        currentData.name = nameInput;
        currentData.mode = mode;
        currentData.total = 0;
        currentData.correct = 0;
        currentData.wrong = 0;
        isWaitingForNext = false;

        // 設置畫面上顯示的文字
        document.getElementById('lbl-name').innerText = currentData.name;
        let modeTitle = '基礎練習';
        if(mode === 'advanced') modeTitle = '進階練習';
        if(mode === 'contest') modeTitle = '⏱️ 1分鐘競賽';
        document.getElementById('lbl-mode').innerText = modeTitle;

        // 調整版面元素
        if (mode === 'contest') {
            document.getElementById('timer-wrapper').classList.remove('hidden');
            document.getElementById('wrong-box-title').innerHTML = `嘗試次數: <span id="lbl-wrong">0</span> 次`;
            timeLeft = 60;
            document.getElementById('timer-sec').innerText = timeLeft;
        } else {
            document.getElementById('timer-wrapper').classList.add('hidden');
            document.getElementById('wrong-box-title').innerHTML = `答錯題數: <span id="lbl-wrong">0</span> 題`;
        }

        updateScoreboard();
        
        // 切換畫面
        document.getElementById('login-stage').classList.add('hidden');
        document.getElementById('result-stage').classList.add('hidden');
        document.getElementById('quiz-stage').classList.remove('hidden');
        
        generateQuestion();

        // 如果是競賽模式，開啟計時器
        if (mode === 'contest') {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-sec').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    endContest();
                }
            }, 1000);
        }
    }

    function getRandomNum() { return Math.floor(Math.random() * 21) - 10; }
    function getRandomOp() { return Math.random() < 0.5 ? '+' : '-'; }
    function formatNum(num) { return num < 0 ? `(${num})` : num; }

    // 生成題目
    function generateQuestion() {
        isWaitingForNext = false;
        document.getElementById('feedback-text').className = 'feedback';
        document.getElementById('feedback-text').innerText = '';
        document.getElementById('space-hint').classList.add('hidden');
        
        const ansInput = document.getElementById('user-answer');
        ansInput.value = '';
        ansInput.disabled = false;
        ansInput.focus();
        document.getElementById('btn-submit').disabled = false;

        let qText = '';
        // 基礎模式 或 競賽模式 (競賽一律採用基礎2個數題型)
        if (currentData.mode === 'basic' || currentData.mode === 'contest') {
            let n1 = getRandomNum();
            let n2 = getRandomNum();
            let op = getRandomOp();
            qText = `${formatNum(n1)} ${op} ${formatNum(n2)} = ?`;
            currentAnswer = op === '+' ? n1 + n2 : n1 - n2;
        } 
        // 進階模式
        else if (currentData.mode === 'advanced') {
            let n1 = getRandomNum();
            let n2 = getRandomNum();
            let n3 = getRandomNum();
            let op1 = getRandomOp();
            let op2 = getRandomOp();
            qText = `${formatNum(n1)} ${op1} ${formatNum(n2)} ${op2} ${formatNum(n3)} = ?`;
            let temp = op1 === '+' ? n1 + n2 : n1 - n2;
            currentAnswer = op2 === '+' ? temp + n3 : temp - n3;
        }

        document.getElementById('question-text').innerText = qText;
    }

    // 檢查答案核心邏輯
    function checkAnswer() {
        if (currentData.mode !== 'contest' && isWaitingForNext) return;

        const userInput = document.getElementById('user-answer').value;
        if (userInput === '') {
            alert('請輸入答案！');
            return;
        }

        const userAnswer = parseInt(userInput, 10);
        currentData.total++;

        const feedbackEl = document.getElementById('feedback-text');
        const ansInput = document.getElementById('user-answer');

        // ==== 情況 A：如果是 1 分鐘競賽模式 ====
        if (currentData.mode === 'contest') {
            if (userAnswer === currentAnswer) {
                currentData.correct++;
                feedbackEl.innerText = '⭕ 答對了！';
                feedbackEl.className = 'feedback correct';
                setTimeout(() => { if (timeLeft > 0) generateQuestion(); }, 100);
            } else {
                feedbackEl.innerText = '❌ 算錯囉，再試一次！';
                feedbackEl.className = 'feedback wrong';
                ansInput.value = '';
                ansInput.focus();
            }
        } 
        // ==== 情況 B：如果是自主練習模式 (基礎/進階) ====
        else {
            ansInput.disabled = true;
            document.getElementById('btn-submit').disabled = true;

            if (userAnswer === currentAnswer) {
                currentData.correct++;
                feedbackEl.innerText = '⭕ 太棒了！答對了！';
                feedbackEl.className = 'feedback correct';
                savePracticeData(); // 儲存自主練習記錄
                
                isWaitingForNext = true;
                setTimeout(() => { if(isWaitingForNext) generateQuestion(); }, 2000);
            } else {
                currentData.wrong++;
                feedbackEl.innerText = `❌ 答錯囉！正確答案是：${currentAnswer}`;
                feedbackEl.className = 'feedback wrong';
                document.getElementById('space-hint').classList.remove('hidden');
                savePracticeData(); // 儲存自主練習記錄
                
                isWaitingForNext = true;
            }
        }

        updateScoreboard();
    }

    // 更新計分板顯示
    function updateScoreboard() {
        document.getElementById('lbl-correct').innerText = currentData.correct;
        document.getElementById('lbl-total').innerText = currentData.total;
        
        if (currentData.mode === 'contest') {
            document.getElementById('lbl-wrong').innerText = currentData.total; // 競賽模式顯示嘗試總次數
        } else {
            document.getElementById('lbl-wrong').innerText = currentData.wrong; // 練習模式顯示答錯題數
        }
        
        let rate = currentData.total === 0 ? 0 : Math.round((currentData.correct / currentData.total) * 100);
        document.getElementById('lbl-rate').innerText = rate;
    }

    // 競賽時間到結束
    function endContest() {
        clearInterval(timerInterval);
        document.getElementById('user-answer').blur();
        document.getElementById('quiz-stage').classList.add('hidden');
        document.getElementById('result-stage').classList.remove('hidden');

        document.getElementById('final-correct').innerText = currentData.correct;
        document.getElementById('final-total').innerText = currentData.total;
        let rate = currentData.total === 0 ? 0 : Math.round((currentData.correct / currentData.total) * 100);
        document.getElementById('final-rate').innerText = rate;

        saveContestDataAndLoadLeaderboard();
    }

    // 監聽鍵盤 Enter 與 空白鍵
    document.addEventListener('keydown', function(event) {
        if (document.getElementById('quiz-stage').classList.contains('hidden')) return;

        if (event.key === 'Enter') {
            if (currentData.mode === 'contest' || !isWaitingForNext) {
                checkAnswer();
            }
        } else if (event.key === ' ' || event.code === 'Space') {
            if (currentData.mode !== 'contest' && isWaitingForNext) {
                event.preventDefault();
                generateQuestion();
            }
        }
    });

    // 返回主選單
    function exitGame() {
        clearInterval(timerInterval);
        document.getElementById('quiz-stage').classList.add('hidden');
        document.getElementById('result-stage').classList.add('hidden');
        document.getElementById('login-stage').classList.remove('hidden');
        document.getElementById('username').value = '';
    }

    // 【後台同步】1. 儲存普通練習數據 (quiz_records 分支)
    function savePracticeData() {
        if (!database) return;
        let rate = Math.round((currentData.correct / currentData.total) * 100);
        let modeText = currentData.mode === 'basic' ? '基礎' : '進階';
        
        database.ref('quiz_records/' + currentData.name + '/' + modeText).set({
            name: currentData.name,
            mode: modeText,
            total: currentData.total,
            correct: currentData.correct,
            wrong: currentData.wrong,
            rate: rate + '%',
            lastUpdate: new Date().toLocaleString()
        });
    }

    // 【後台同步】2. 儲存競賽數據並讀取前20名排行榜 (contest_records 分支)
    function saveContestDataAndLoadLeaderboard() {
        if (!database) return;
        const timestamp = new Date().getTime();
        const nowString = new Date().toLocaleString('zh-TW', { hour12: false });

        database.ref('contest_records/' + timestamp).set({
            name: currentData.name,
            correct: currentData.correct,
            total: currentData.total,
            time: nowString
        }).then(() => {
            // 讀取並排列前20名
            database.ref('contest_records').once('value', (snapshot) => {
                let allRecords = [];
                snapshot.forEach((childSnapshot) => {
                    allRecords.push(childSnapshot.val());
                });

                // 排序：先比答對題數(降序)，再比嘗試次數(升序，代表越精準)
                allRecords.sort((a, b) => {
                    if (b.correct !== a.correct) return b.correct - a.correct;
                    return a.total - b.total;
                });

                const tbody = document.getElementById('leaderboard-body');
                tbody.innerHTML = '';

                allRecords.slice(0, 20).forEach((record, index) => {
                    let rowClass = index === 0 ? 'class="top1"' : '';
                    let shortTime = record.time.replace(/^\d{4}\//, ""); 

                    tbody.innerHTML += `
                        <tr ${rowClass}>
                            <td>${index + 1}</td>
                            <td>${record.name}</td>
                            <td style="font-weight:bold; color:#e74c3c;">${record.correct} 題</td>
                            <td style="font-size:12px; color:#7f8c8d;">${shortTime}</td>
                        </tr>
                    `;
                });
            });
        });
    }
</script>

</body>
</html>
